{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card shadow-sm">
            <div class="card-header text-white text-center py-3" style="background: linear-gradient(135deg, #0d6efd, #6610f2);">
                <h4 class="mb-0">MASTER COMISII - Etapa 1: Import date</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('master.upload') }}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Numar HG *</label>
                            <input type="text" name="hg_number" class="form-control" placeholder="Ex: 1409/2024" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Data sedinta <small class="text-muted">(optional)</small></label>
                            <input type="text" name="data_sedinta" class="form-control" placeholder="Ex: 25.02.2026">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fisier MASTER general *</label>
                        <input type="file" name="master" class="form-control" accept=".xlsx,.xls" required>
                        <div class="form-text">MASTER general convocari si HSD (fisierul central care se completeaza)</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fisier sursa date *</label>
                        <input type="file" name="sursa" class="form-control" accept=".xlsx,.xls" required>
                        <div class="form-text">Tabel afisare comisie (Format A) sau SITUATIE TOTAL (Format B) — detectat automat</div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Importa si Previzualizeaza</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
